<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Familiar Automático</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#34495e">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 950px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 { text-align: center; color: #2c3e50; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background-color: #bdc3c7; color: #2c3e50; border: none; padding: 12px 24px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        .tab-btn.activo { background-color: #27ae60; color: white; }
        .tab-contenido { display: none; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-contenido.activo { display: block; }

        h3 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; }
        
        .grupo-formulario { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        .btn-accion { color: white; border: none; padding: 15px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; margin-top: 10px; transition: background 0.3s; }
        .btn-accion:disabled { background-color: #95a5a6 !important; cursor: not-allowed; }
        .btn-generar { background-color: #e67e22; font-size: 20px; box-shadow: 0 4px 6px rgba(230, 126, 34, 0.3); }
        .btn-generar:hover { background-color: #d35400; }

        .botones-secundarios { display: flex; gap: 10px; margin-top: 20px; }
        .btn-guardar { background-color: #2980b9; flex: 1; }
        .btn-guardar:hover { background-color: #1f618d; }
        .btn-historial { background-color: #8e44ad; flex: 1; }
        .btn-historial:hover { background-color: #732d91; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 16px; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: center; }
        th { background-color: #34495e; color: white; }
        td { cursor: pointer; transition: background 0.2s; }
        td:hover { background-color: #fcf3cf; }

        .receta-item { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; background-color: #f9f9f9; }
        .etiqueta-tipo { background-color: #3498db; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.8em; margin-left: 10px; text-transform: uppercase;}
        
        .acciones-receta { display: flex; gap: 8px; }
        .btn-editar { background-color: #f39c12; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-borrar { background-color: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cargar { background-color: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .alerta { padding: 15px; border-radius: 6px; margin-top: 15px; display: none; font-weight: bold; text-align: center; }
        .alerta.exito { background-color: #d5f5e3; color: #1e8449; }
        .alerta.error { background-color: #fadbd8; color: #c0392b; }
        .alerta.advertencia { background-color: #fcf3cf; color: #b9770e; }

        .estado-db { text-align: center; margin-bottom: 20px; font-size: 1.1em; color: #7f8c8d; }

        #modalMenus { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; }
        .modal-contenido { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 700px; border-radius: 8px; max-height: 80vh; overflow-y: auto; }

        /* ESTILOS DEL BOTÓN FLOTANTE DE INSTALACIÓN */
        #btnInstalarApp {
            display: none; /* Oculto hasta que el celular diga que se puede instalar */
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 9999;
            transition: transform 0.2s;
        }
        #btnInstalarApp:hover { transform: scale(1.05); background-color: #c0392b; }
    </style>
</head>
<body>

    <h1>👨‍🍳 Sistema de Menú Familiar</h1>

    <div class="tabs">
        <button class="tab-btn activo" onclick="cambiarTab('planificador')">📅 Armar Menú Semanal</button>
        <button class="tab-btn" onclick="cambiarTab('recetario')">📖 Administrar Mis Recetas</button>
    </div>

    <div id="tab-planificador" class="tab-contenido activo">
        <div class="estado-db" id="contadorRecetas">Conectando a tu base de datos Firebase...</div>
        <button class="btn-accion btn-generar" onclick="generarMenu()">✨ Generar Menú de la Semana ✨</button>
        
        <table id="menuTabla">
            <thead>
                <tr><th>Día</th><th>Desayuno</th><th>Merienda</th><th>Comida / Cena</th></tr>
            </thead>
            <tbody id="menuCuerpo">
                <tr><td colspan="4" style="padding: 30px; color: #7f8c8d;">Haz clic en el botón naranja para generar tu menú o carga uno guardado.</td></tr>
            </tbody>
        </table>

        <div class="botones-secundarios">
            <button class="btn-accion btn-guardar" id="btnGuardarMenu">💾 Guardar este Menú en Firebase</button>
            <button class="btn-accion btn-historial" onclick="abrirModalMenus()">📅 Ver Menús Guardados</button>
        </div>
        <div id="mensajePlanificador" class="alerta"></div>
    </div>

    <div id="tab-recetario" class="tab-contenido">
        <h3 id="tituloFormulario">Añadir Nueva Receta</h3>
        <div class="grupo-formulario">
            <label>Tipo de comida</label>
            <select id="formTipo">
                <option value="desayuno">Desayuno</option>
                <option value="merienda">Merienda</option>
                <option value="cena">Comida / Cena</option>
            </select>
        </div>
        <div class="grupo-formulario">
            <label>Nombre del Plato</label>
            <input type="text" id="formNombre" placeholder="Ej: Omelet de jamón y queso con arepa">
        </div>
        <div class="grupo-formulario">
            <label>Ingredientes Principales (Opcional, separados por coma)</label>
            <input type="text" id="formIngredientes" placeholder="Ej: huevos, jamón, queso, arepa">
        </div>

        <button class="btn-accion" style="background-color: #27ae60;" id="btnGuardarReceta">Guardar Receta</button>
        <button class="btn-accion" style="background-color: #95a5a6; display: none; margin-top: 5px;" id="btnCancelarEdicion">Cancelar Edición</button>
        <div id="mensajeFormulario" class="alerta"></div>

        <h3 style="margin-top: 40px;">Tus Recetas Actuales</h3>
        <div id="listaRecetasGuardadas"></div>
    </div>

    <div id="modalMenus">
        <div class="modal-contenido">
            <h2 style="margin-top: 0; color: #2c3e50;">Historial de Menús Semanales</h2>
            <div id="listaMenusGuardados"></div>
            <button class="btn-accion" style="background-color: #7f8c8d; margin-top: 15px;" onclick="cerrarModalMenus()">Cerrar Ventana</button>
        </div>
    </div>

    <button id="btnInstalarApp">📲 Instalar App</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCq1OYvrc-bL_HB-AA1O57UXx9B_JxlO_I",
            authDomain: "bingo-sala-2.firebaseapp.com",
            databaseURL: "https://bingo-sala-2-default-rtdb.firebaseio.com",
            projectId: "bingo-sala-2",
            storageBucket: "bingo-sala-2.firebasestorage.app",
            messagingSenderId: "801683156396",
            appId: "1:801683156396:web:b02bf1d6482c297b515e09",
            measurementId: "G-5KK4JTYW69"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let recetarioFirebase = { desayuno: [], merienda: [], cena: [] };
        let recetasUsadas = new Set();
        const diasSemana = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
        let idRecetaEnEdicion = null;

        // LÓGICA DE FIREBASE Y FUNCIONALIDAD (Se mantiene intacta)
        onSnapshot(collection(db, "recetas_familiares"), (snapshot) => {
            recetarioFirebase = { desayuno: [], merienda: [], cena: [] };
            let htmlListaRecetas = "";
            let totalRecetas = 0;

            if (snapshot.empty) {
                document.getElementById('contadorRecetas').innerHTML = "No tienes recetas guardadas aún.";
                return;
            }

            snapshot.forEach((documento) => {
                const data = documento.data();
                const receta = { id: documento.id, nombre: data.nombre, ingredientes: data.ingredientes || [] };
                totalRecetas++;

                if (data.tipo === 'desayuno') recetarioFirebase.desayuno.push(receta);
                else if (data.tipo === 'merienda') recetarioFirebase.merienda.push(receta);
                else if (data.tipo === 'cena') recetarioFirebase.cena.push(receta);

                const strIngredientes = receta.ingredientes.join(', ').replace(/"/g, '&quot;');
                htmlListaRecetas += `
                    <div class="receta-item">
                        <div><strong>${data.nombre}</strong> <span class="etiqueta-tipo">${data.tipo}</span><br>
                        <span style="font-size: 0.9em; color: #7f8c8d;">${receta.ingredientes.join(', ')}</span></div>
                        <div class="acciones-receta">
                            <button class="btn-editar" data-id="${documento.id}" data-tipo="${data.tipo}" data-nombre="${data.nombre.replace(/"/g, '&quot;')}" data-ingredientes="${strIngredientes}">Editar</button>
                            <button class="btn-borrar" data-id="${documento.id}">Borrar</button>
                        </div>
                    </div>`;
            });

            document.getElementById('contadorRecetas').innerHTML = `Tienes <strong>${totalRecetas}</strong> recetas listas para sortear.`;
            document.getElementById('listaRecetasGuardadas').innerHTML = htmlListaRecetas;
            
            document.querySelectorAll('.btn-borrar').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idABorrar = e.target.getAttribute('data-id');
                    if(confirm("¿Seguro que quieres borrar esta receta?")) await deleteDoc(doc(db, "recetas_familiares", idABorrar));
                });
            });

            document.querySelectorAll('.btn-editar').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const b = e.target;
                    document.getElementById('formTipo').value = b.getAttribute('data-tipo');
                    document.getElementById('formNombre').value = b.getAttribute('data-nombre');
                    document.getElementById('formIngredientes').value = b.getAttribute('data-ingredientes');
                    idRecetaEnEdicion = b.getAttribute('data-id');
                    document.getElementById('tituloFormulario').textContent = "✏️ Editando Receta";
                    const btnG = document.getElementById('btnGuardarReceta');
                    btnG.textContent = "Actualizar Receta"; btnG.style.backgroundColor = "#e67e22";
                    document.getElementById('btnCancelarEdicion').style.display = "block";
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        });

        document.getElementById('btnCancelarEdicion').addEventListener('click', () => {
            idRecetaEnEdicion = null;
            document.getElementById('formNombre').value = ""; document.getElementById('formIngredientes').value = "";
            document.getElementById('tituloFormulario').textContent = "Añadir Nueva Receta";
            const btnG = document.getElementById('btnGuardarReceta');
            btnG.textContent = "Guardar Receta"; btnG.style.backgroundColor = "#27ae60";
            document.getElementById('btnCancelarEdicion').style.display = "none";
        });

        document.getElementById('btnGuardarReceta').addEventListener('click', async () => {
            const tipo = document.getElementById('formTipo').value;
            const nombre = document.getElementById('formNombre').value.trim();
            const ingRaw = document.getElementById('formIngredientes').value;
            const msj = document.getElementById('mensajeFormulario');

            if (!nombre) return mostrarAlerta(msj, "Debes escribir al menos el nombre del plato.", "error");

            const ingredientesLimpios = ingRaw ? ingRaw.split(',').map(i => i.trim().toLowerCase()).filter(i => i !== "") : [];
            const btn = document.getElementById('btnGuardarReceta');
            btn.disabled = true; btn.textContent = idRecetaEnEdicion ? "Actualizando..." : "Guardando...";

            try {
                if (idRecetaEnEdicion) {
                    await updateDoc(doc(db, "recetas_familiares", idRecetaEnEdicion), { tipo, nombre, ingredientes: ingredientesLimpios });
                    mostrarAlerta(msj, "¡Receta actualizada con éxito!", "exito");
                } else {
                    await addDoc(collection(db, "recetas_familiares"), { tipo, nombre, ingredientes: ingredientesLimpios, fecha: new Date() });
                    mostrarAlerta(msj, "¡Receta guardada exitosamente!", "exito");
                }
                document.getElementById('btnCancelarEdicion').click(); // Restablece form
            } catch (error) {
                mostrarAlerta(msj, "Error al procesar la receta.", "error");
            } finally { btn.disabled = false; }
        });

        window.generarMenu = function() {
            recetasUsadas.clear();
            let htmlCuerpo = '';
            diasSemana.forEach(dia => {
                htmlCuerpo += `<tr>
                    <td><strong>${dia}</strong></td>
                    <td contenteditable="true">${seleccionarReceta('desayuno')}</td>
                    <td contenteditable="true">${seleccionarReceta('merienda')}</td>
                    <td contenteditable="true">${seleccionarReceta('cena')}</td>
                </tr>`;
            });
            document.getElementById('menuCuerpo').innerHTML = htmlCuerpo;
        }

        function seleccionarReceta(tipo) {
            let opciones = recetarioFirebase[tipo];
            if (opciones.length === 0) return `❌ Faltan recetas`;
            let sinRepetir = opciones.filter(r => !recetasUsadas.has(r.nombre));
            if (sinRepetir.length === 0) sinRepetir = opciones; 
            const elegida = sinRepetir[Math.floor(Math.random() * sinRepetir.length)].nombre;
            recetasUsadas.add(elegida); return elegida;
        }

        document.getElementById('btnGuardarMenu').addEventListener('click', async () => {
            const cont = document.getElementById('menuCuerpo').innerHTML;
            const msj = document.getElementById('mensajePlanificador');
            const btn = document.getElementById('btnGuardarMenu');
            if(cont.includes('Haz clic en el botón naranja')) return mostrarAlerta(msj, "Genera un menú primero.", "error");

            btn.disabled = true; btn.textContent = "Guardando...";
            const fechaActual = new Date().toLocaleDateString('es-ES', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' });

            try {
                await addDoc(collection(db, "menus_guardados"), { fechaTexto: fechaActual, htmlMenu: cont, timestamp: new Date().getTime() });
                mostrarAlerta(msj, "¡Menú guardado en Firebase!", "exito");
            } catch (error) { mostrarAlerta(msj, "Error al guardar el menú.", "error"); } 
            finally { btn.disabled = false; btn.textContent = "💾 Guardar este Menú en Firebase"; }
        });

        window.abrirModalMenus = async function() {
            const cont = document.getElementById('listaMenusGuardados');
            cont.innerHTML = "<p>Cargando tu historial...</p>";
            document.getElementById('modalMenus').style.display = 'block';

            try {
                const querySnapshot = await getDocs(collection(db, "menus_guardados"));
                let menus = []; querySnapshot.forEach(doc => menus.push({ id: doc.id, ...doc.data() }));
                menus.sort((a, b) => b.timestamp - a.timestamp);

                if (menus.length === 0) cont.innerHTML = "<p>No hay menús guardados.</p>";
                else {
                    let html = "";
                    menus.forEach(menu => {
                        // AQUÍ ESTÁ LA MAGIA: Eliminamos los saltos de línea (\n y \r) que rompían el botón
                        const htmlLimpio = menu.htmlMenu.replace(/'/g, "&apos;").replace(/"/g, "&quot;").replace(/\n/g, '').replace(/\r/g, '');
                        
                        html += `<div class="receta-item"><div><strong>Guardado el:</strong> ${menu.fechaTexto}</div>
                                <div class="acciones-receta"><button class="btn-cargar" onclick="cargarMenuEnTabla('${htmlLimpio}')">Cargar</button>
                                <button class="btn-borrar btn-borrar-menu" data-id="${menu.id}">Borrar</button></div></div>`;
                    });
                    cont.innerHTML = html;
                    
                    document.querySelectorAll('.btn-borrar-menu').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if(confirm("¿Eliminar menú?")) { await deleteDoc(doc(db, "menus_guardados", e.target.getAttribute('data-id'))); abrirModalMenus(); }
                        });
                    });
                }
            } catch (error) { cont.innerHTML = "<p style='color:red;'>Error al cargar historial.</p>"; }
        }

        window.cargarMenuEnTabla = function(html) { document.getElementById('menuCuerpo').innerHTML = html; cerrarModalMenus(); }
        window.cerrarModalMenus = function() { document.getElementById('modalMenus').style.display = 'none'; }
        window.cambiarTab = function(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('activo'));
            document.querySelectorAll('.tab-contenido').forEach(tab => tab.classList.remove('activo'));
            event.target.classList.add('activo'); document.getElementById('tab-' + tabId).classList.add('activo');
        }
        function mostrarAlerta(el, texto, tipo) { el.textContent = texto; el.className = "alerta " + tipo; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }

        // ==========================================
        // LÓGICA DE INSTALACIÓN PWA (Botón Flotante)
        // ==========================================
        let deferredPrompt;
        const btnInstalarApp = document.getElementById('btnInstalarApp');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Previene que aparezca la alerta por defecto de Android
            e.preventDefault();
            // Guarda el evento para dispararlo cuando se haga clic en el botón
            deferredPrompt = e;
            // Muestra el botón flotante
            btnInstalarApp.style.display = 'block';
        });

        btnInstalarApp.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Muestra la ventana nativa de instalación de Chrome/Safari
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') console.log('App instalada');
                
                // Limpia la variable (solo se puede usar una vez)
                deferredPrompt = null;
                // Oculta el botón flotante
                btnInstalarApp.style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            // Si se instaló correctamente, asegura que el botón desaparezca
            btnInstalarApp.style.display = 'none';
        });

        // Registrar el Service Worker para que funcione la instalación
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker registrado con éxito'))
                .catch(err => console.error('Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>
